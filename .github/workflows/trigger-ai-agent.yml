name: Trigger AI Blog

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

concurrency:
  group: ai-blog-${{ github.ref }}
  cancel-in-progress: true


jobs:
  call-agent:
    if: contains(github.event.head_commit.message, 'ai-blog')
    uses: Gaurav0807/ai-blog-agents/.github/workflows/run-agent.yml@main
    with:
      target_repo: Gaurav0807/Docker
      target_branch: main
      trigger_sha: ${{ github.sha }}
      commit_message: ${{ github.event.head_commit.message }}
    secrets: inherit

