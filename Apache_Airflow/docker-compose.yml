x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  env_file:
    - airflow.env
  environment:
    - PYTHONPATH=/opt/airflow
  volumes:
    - ./jobs:/opt/airflow/jobs
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
  networks:
    - test_network

services:
  postgres:
    image: postgres:14.0
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    networks:
      - test_network

  # pgadmin:
  #   image: dpage/pgadmin4
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: admin@example.com
  #     PGADMIN_DEFAULT_PASSWORD: admin
  #   ports:
  #     - "6050:80"
  #   depends_on:
  #     - postgres
  #   networks:
  #     - test_network

  airflow-init:
    <<: *airflow-common
    depends_on:
      - postgres
    entrypoint: >
      bash -c "
      airflow db init &&
      airflow db migrate &&
      airflow users create --username admin --firstname golu --lastname rawat --role Admin --email golu@gmail.com --password admin || true
      "

  scheduler:
    <<: *airflow-common
    depends_on:
      - airflow-init
    command: airflow scheduler

  webserver:
    <<: *airflow-common
    depends_on:
      - airflow-init
    command: airflow webserver
    ports:
      - "6070:8080"

networks:
  test_network: